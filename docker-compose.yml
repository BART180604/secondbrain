version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secondbrain_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: secondbrain
      POSTGRES_PASSWORD: secondbrain_secret
      POSTGRES_DB: secondbrain
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: